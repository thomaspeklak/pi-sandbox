# Copy to ~/.config/ags/config.toml and replace ALL placeholder values.
# This file intentionally uses dummy values for open-source safety.

[sandbox]
image = "example/agent-sandbox:latest"
containerfile = "~/.config/ags/Containerfile"
cache_dir = "~/.cache/ags"
gitconfig_path = "~/.config/ags/gitconfig-agent"
auth_key = "~/.ssh/ags-agent-auth"
sign_key = "~/.ssh/ags-agent-signing"
bootstrap_files = ["auth.json", "models.json"]
container_boot_dirs = ["/home/dev/.ssh", "/home/dev/.config/example-tool"]
passthrough_env = ["EXAMPLE_API_KEY"]

# Required agent config mounts (explicit and inspectable)
[[agent_mount]]
host = "~/.claude.json"
container = "/home/dev/.claude.json"
kind = "file"

[[agent_mount]]
host = "~/.claude"
container = "/home/dev/.claude"

[[agent_mount]]
host = "~/.codex"
container = "/home/dev/.codex"

[[agent_mount]]
host = "~/.pi"
container = "/home/dev/.pi"

[[agent_mount]]
host = "~/.config/opencode"
container = "/home/dev/.config/opencode"

[[agent_mount]]
host = "~/.gemini"
container = "/home/dev/.gemini"

# Base mounts (replace with paths you actually need)
[[mount]]
host = "~/path/to/pi/prompts"
container = "/home/dev/.pi/agent-host/prompts"
mode = "ro"
kind = "dir"
optional = true

[[mount]]
host = "~/path/to/shared/skills"
container = "/home/dev/.claude/skills"
mode = "ro"
kind = "dir"
optional = true

# Generic tool example
[[tool]]
name = "example-tool"
path = "~/path/to/example-tool"
container_path = "/usr/local/bin/example-tool"
mode = "ro"
optional = true

[[tool.directory]]
host = "~/.config/example-tool"
container = "/home/dev/.config/example-tool"
mode = "rw"
kind = "dir"
create = true

[[tool.secret]]
env = "EXAMPLE_TOOL_TOKEN"
from_env = "EXAMPLE_TOOL_TOKEN"

[[tool.secret]]
env = "EXAMPLE_TOOL_TOKEN"
secret_store = { service = "example-service", username = "example-user" }

# Generic secret example
[[secret]]
env = "EXAMPLE_GH_TOKEN"
from_env = "EXAMPLE_GH_TOKEN"

[[secret]]
env = "EXAMPLE_GH_TOKEN"
secret_store = { service = "example-gh-service", account = "example-account" }

# Optional dcg user config/state mounts.
# Project-local .dcg.toml is picked up automatically from the workspace mount.
# Add these if you want sandbox dcg to use your host-managed global config,
# allowlists, allow-once state, and history database.
[[mount]]
host = "$HOME/.config/dcg"
container = "/home/dev/.config/dcg"
mode = "rw"
kind = "dir"
optional = true

[[mount]]
host = "$HOME/.local/share/dcg"
container = "/home/dev/.local/share/dcg"
mode = "rw"
kind = "dir"
optional = true
create = true

# MCP auth token persistence (so MCP servers don't re-auth every session)
[[mount]]
host = "$HOME/.mcp-auth"
container = "/home/dev/.mcp-auth"
mode = "rw"
kind = "dir"
create = true

[auth_proxy]
auto_allow_domains = []  # e.g. ["mcp.linear.app", "github.com"]

[browser]
enabled = false
command = "your-browser-command"
profile_dir = "~/.cache/ags/browser-profile"
debug_port = 9222
pi_skill_path = "/home/dev/example-browser-skill"
command_args = []

[update]
pi_spec = "@mariozechner/pi-coding-agent"
minimum_release_age = 1440
