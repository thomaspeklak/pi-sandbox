name: Release

on:
  push:
    branches: [main]
    paths:
      - "crates/ags/Cargo.toml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
      previous_version: ${{ steps.detect.outputs.previous_version }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          CARGO_FILE="crates/ags/Cargo.toml"

          VERSION=$(python - <<'PY'
          import tomllib
          with open("crates/ags/Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PY
          )

          PREVIOUS_VERSION=""

          if [[ "$EVENT_NAME" == "push" ]] && [[ -n "${BEFORE_SHA:-}" ]] && [[ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "$BEFORE_SHA:$CARGO_FILE" 2>/dev/null; then
              PREVIOUS_VERSION=$(git show "$BEFORE_SHA:$CARGO_FILE" | python - <<'PY'
          import tomllib, sys
          print(tomllib.loads(sys.stdin.read())["package"]["version"])
          PY
              )
            fi
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            SHOULD_RELEASE="true"
          elif [[ -z "$PREVIOUS_VERSION" ]]; then
            SHOULD_RELEASE="true"
          elif [[ "$PREVIOUS_VERSION" != "$VERSION" ]]; then
            SHOULD_RELEASE="true"
          else
            SHOULD_RELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

          echo "Detected version: $VERSION"
          if [[ -n "$PREVIOUS_VERSION" ]]; then
            echo "Previous version: $PREVIOUS_VERSION"
          fi
          echo "should_release=$SHOULD_RELEASE"

  build:
    runs-on: ubuntu-latest
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p ags --release

      - name: Package artifacts
        env:
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p dist
          cp target/release/ags dist/ags
          cp README.md LICENSE dist/

          tar -C dist -czf "dist/ags-${VERSION}-linux-x86_64.tar.gz" ags README.md LICENSE
          (cd dist && sha256sum "ags-${VERSION}-linux-x86_64.tar.gz" > "ags-${VERSION}-linux-x86_64.tar.gz.sha256")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-v${{ needs.detect-version.outputs.version }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    runs-on: ubuntu-latest
    needs: [detect-version, build]
    if: needs.detect-version.outputs.should_release == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-v${{ needs.detect-version.outputs.version }}
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          name: ags v${{ needs.detect-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
